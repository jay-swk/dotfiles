# ============================================
# tmux config — Ghostty 최적화
# ============================================

# --- 마우스 완전 지원 ---
set -g mouse on

# --- True color + 256색 ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"

# --- Prefix: Ctrl+a (Ctrl+b보다 편함) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 스크롤 버퍼 늘리기 ---
set -g history-limit 50000

# --- 인덱스 1부터 (0은 키보드 왼쪽 끝이라 불편) ---
set -g base-index 1
setw -g pane-base-index 1

# --- 패널 분할: 직관적 키 ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- 새 창은 현재 경로 유지 ---
bind c new-window -c "#{pane_current_path}"

# --- 패널 이동: Alt+방향키 (prefix 없이) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- 패널 크기 조절: Prefix + Shift+방향키 ---
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up resize-pane -U 3
bind -r S-Down resize-pane -D 3

# --- 창 이동: Shift+좌우 (prefix 없이) ---
bind -n S-Left previous-window
bind -n S-Right next-window

# --- 빠른 반응 (ESC 딜레이 제거) ---
set -sg escape-time 0

# --- 포커스 이벤트 (vim/에디터 연동) ---
set -g focus-events on

# --- 자동 번호 재정렬 ---
set -g renumber-windows on

# --- 복사 모드: vi 스타일 ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- 설정 리로드: Prefix + r ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ============================================
# 상태바 — Dracula 테마
# ============================================
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"

# 왼쪽: 세션명
set -g status-left-length 30
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36] "

# 가운데: 창 목록
setw -g window-status-format "#[fg=#6272a4] #I:#W "
setw -g window-status-current-format "#[fg=#282a36,bg=#50fa7b,bold] #I:#W #[fg=#50fa7b,bg=#282a36]"

# 오른쪽: 호스트 + 시간
set -g status-right-length 60
set -g status-right "#[fg=#6272a4]│ #[fg=#f8f8f2]%m/%d %H:%M #[fg=#282a36,bg=#ff79c6,bold] #H "

# 패널 테두리
set -g pane-border-style "fg=#6272a4"
set -g pane-active-border-style "fg=#50fa7b"

# 메시지 스타일
set -g message-style "bg=#44475a,fg=#f8f8f2"
